name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Lint · Typecheck · Unit/Integration · Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: synced_docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://app_user:app_user@localhost:5432/synced_docs
      DATABASE_ADMIN_URL: postgres://postgres:postgres@localhost:5432/synced_docs
      AUTH_SECRET: ci-secret-not-for-production
      NEXT_PUBLIC_WS_URL: ws://localhost:1234
      WS_PORT: "1234"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply migrations
        run: npm run db:migrate
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit + integration tests
        run: npm test
      - name: Build
        run: npm run build

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: synced_docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://app_user:app_user@localhost:5432/synced_docs
      DATABASE_ADMIN_URL: postgres://postgres:postgres@localhost:5432/synced_docs
      AUTH_SECRET: ci-secret-not-for-production
      NEXT_PUBLIC_WS_URL: ws://localhost:1234
      WS_PORT: "1234"
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        run: npx playwright test
